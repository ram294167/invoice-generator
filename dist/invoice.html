<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Invoice</title>
  <link rel="stylesheet" href="invoice.css">
</head>
<body onload="loadFromLocalStorage()">
  <script>
    fetch('/api/me')
      .then(res => {
        if (!res.ok) location.href = '/login.html';
      });
  </script>
  <!-- TOP LEFT CORNER DROPDOWN -->
<div style="position: absolute; top: 10px; left: 10px;">
  <select id="userMenu" onchange="handleMenuSelect()" style="padding: 6px; font-size: 14px;">
    <option value="">☰ Menu</option>
    <option value="invoices">📂 Invoices</option>
    <option value="logout">🚪 Logout</option>
  </select>

  <select id="invoiceList" style="display: none; margin-top: 8px; padding: 4px;" onchange="showInvoiceButtons()">
    <option value="">-- Select Invoice --</option>
  </select>

  <div id="invoiceButtons" style="margin-top: 6px; display: none;">
  <button onclick="viewSelectedInvoice()">👁️ View</button>
  <button onclick="downloadSelectedInvoice()">⬇️ Download</button>
  <button onclick="deleteSelectedInvoice()" style="background-color: #dc3545; color: white;">🗑️ Delete</button>
</div>

</div>


<div class="invoice-container">
  <div id="invoice-content" class="invoice">

   <div class="top-bar">
<div class="logo-box">
  <input type="file" id="logoInput" accept="image/*" onchange="previewLogo()" style="display: block;" />
  <img id="logo" class="logo-img" style="display: none;" onclick="document.getElementById('logoInput').click()" />
</div>

  <div class="company-name-input">
    <input type="text" id="companyNameInput" placeholder="Enter Company Name">
  </div>
</div>

    <div class="address-section">
  <div class="from-box"  >
    <h4>From</h4>
<textarea id="fromAddress" rows="4" cols="40" placeholder="Enter Provider Address" style="width: 100%; white-space: pre-wrap; font-size: 16px; line-height: 1.4;"></textarea>
<div id="fromAddressDisplay" style="white-space: pre-wrap; display: none;"></div>
</div>
  
    <div class="vertical-divider"></div>
   <div class="invoice-info-box">
    <h4>Invoice Details</h4>
   <label><span>Invoice No:</span><input type="text" id="invoiceNo"></label>
<label><span>Date:</span><input type="date" id="invoiceDate"></label>
<label><span>Event Name:</span><input type="text" id="eventName"></label>
<label><span>Place of Supply:</span><input type="text" id="placeOfSupply"></label>
<label><span>Order No:</span><input type="text" id="orderNo"></label>
<label><span>Phone:</span><input type="text" id="phoneNumber"></label>
</div>    
</div>
    <div class="table-wrapper">
    <table id="items">
      <thead>
        <tr>
          <th>Sr</th>
          <th>Product</th>
          <th class="col-hsn">HSN</th>
          <th>Qty</th>
          <th>Rate</th>
          <th class="col-disc">Disc</th>
          <th>Taxable</th>
          <th class="col-gst">GST%</th>
          <th class="col-gstAmt">GST Amt</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="item-body"></tbody>
        <tfoot>
    <tr>
      <td colspan="6" style="text-align:right;"><strong>Total</strong></td>
      <td id="totalTaxable">0.00</td>
      <td></td>
      <td id="totalGST">0.00</td>
      <td id="grandTotal">0.00</td>
    </tr>
  </tfoot>
    </table>
    </div>

    <button class="btn" onclick="addItem()">Add Item</button>
<div class="matrix-container">
  <!-- Row 1 -->
  <div class="matrix-row">
    <label for="bankName">Bank Name:</label>
    <input type="text" id="bankName">
  </div>
  <div class="matrix-row">
    <label for="accountNumber">Account Number:</label>
    <input type="text" id="accountNumber">
  </div>

  <!-- Row 2 -->
  <div class="matrix-row">
    <label for="ifscCode">IFSC Code:</label>
    <input type="text" id="ifscCode">
  </div>
  <div class="matrix-row">
    <label for="noteText">Note:</label>
    <textarea id="noteText" rows="2"></textarea>
  </div>

  <!-- Row 3: QR Upload -->
  <div class="matrix-row">
    <label for="qrInput">QR Code:</label>
    <div class="upload-inline">
    <input type="file" id="qrInput" accept="image/*" onchange="previewQR()" style="display: block;" />
    <img id="qrPreview" class="qr-img" style="display: none;" onclick="document.getElementById('qrInput').click()" />
  </div>
  </div>

  <!-- Row 4: Signature Upload -->
  <div class="matrix-row">
    <label for="signatureInput">Signature:</label>
      <div class="upload-inline">
    <input type="file" id="signatureInput" accept="image/*" onchange="previewSignature()" style="display: block;" />
    <img id="signaturePreview" class="signature-img" style="display: none;" onclick="document.getElementById('signatureInput').click()" />
      <div class="signature-line"></div>
    </div>
  </div>
</div>

</div>   <!-- ✅ Closing invoice-container -->

<div style="text-align: center; margin-top: 20px;">
  <button class="btn" onclick="downloadPDF()">Download PDF</button>
  <button class="btn" onclick="clearData()">Clear</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="invoice.js"></script>
</body>
</html>
